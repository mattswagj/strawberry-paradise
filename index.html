<!-- ============================================================
     STRAWBERRY PARADISE — Cakes and Desserts
     Single-file bilingual website (Spanish primary / English secondary)
     Language toggle: ES / EN via data-es / data-en attributes
     WhatsApp is the primary order channel.
     ⚠️ PLACEHOLDER markers are noted in comments where data is unconfirmed.
     ============================================================ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --berry:#d6315a;        /* strawberry red */
    --berry-deep:#a81b46;
    --pink:#f7a8c4;
    --pink-soft:#fde4ec;
    --cream:#fff8f3;
    --cream-2:#fff1ea;
    --choc:#5a342a;
    --ink:#3a2530;
    --leaf:#5fae6b;
    --gold:#e7b65a;
    --shadow:0 14px 40px rgba(168,27,70,.14);
    --radius:22px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Quicksand',system-ui,sans-serif;
    color:var(--ink);
    background:var(--cream);
    line-height:1.65;
    overflow-x:hidden;
  }
  h1,h2,h3,.serif{font-family:'Playfair Display',serif}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  section{padding:64px 20px}
  .wrap{max-width:1080px;margin:0 auto}

  /* bilingual text is injected by JS (applyLang) from data-es / data-en attributes */

  .eyebrow{
    text-transform:uppercase;letter-spacing:.22em;font-size:.72rem;
    font-weight:700;color:var(--berry);margin-bottom:10px;
  }
  .section-title{
    font-size:clamp(1.7rem,5vw,2.6rem);color:var(--berry-deep);
    line-height:1.15;margin-bottom:14px;
  }
  .section-intro{max-width:620px;color:#6b5560;margin-bottom:36px;font-size:1.02rem}
  .center{text-align:center;margin-left:auto;margin-right:auto}

  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex;align-items:center;gap:9px;justify-content:center;
    font-family:'Quicksand',sans-serif;font-weight:700;font-size:1rem;
    padding:14px 26px;border-radius:50px;cursor:pointer;border:none;
    transition:transform .18s ease,box-shadow .18s ease;
  }
  .btn-wa{background:#25D366;color:#fff;box-shadow:0 8px 22px rgba(37,211,102,.35)}
  .btn-wa:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(37,211,102,.45)}
  .btn-berry{background:var(--berry);color:#fff;box-shadow:0 8px 22px rgba(214,49,90,.32)}
  .btn-berry:hover{transform:translateY(-2px)}
  .btn-ghost{background:transparent;border:2px solid var(--berry);color:var(--berry)}
  .btn-ghost:hover{background:var(--berry);color:#fff}

  /* ---------- Header ---------- */
  header{
    position:sticky;top:0;z-index:50;
    background:rgba(255,248,243,.92);backdrop-filter:blur(10px);
    border-bottom:1px solid #f4dbe4;
  }
  .nav{display:flex;align-items:center;justify-content:space-between;
    max-width:1080px;margin:0 auto;padding:12px 20px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--berry-deep)}
  .brand .mark{
    width:38px;height:38px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#ff5b86,var(--berry));
    display:grid;place-items:center;font-size:1.2rem;flex-shrink:0;
    box-shadow:0 4px 12px rgba(214,49,90,.35)
  }
  .brand .bn{font-family:'Playfair Display',serif;font-size:1.05rem;line-height:1}
  .brand .bn small{display:block;font-family:'Quicksand';font-weight:500;
    font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--pink)}
  .nav-links{display:flex;align-items:center;gap:22px}
  .nav-links a{font-weight:600;font-size:.92rem;color:var(--ink);transition:color .15s}
  .nav-links a:hover{color:var(--berry)}
  .lang-toggle{
    display:flex;border:1.5px solid var(--berry);border-radius:50px;overflow:hidden;font-size:.8rem;font-weight:700}
  .lang-toggle button{border:none;background:transparent;color:var(--berry);
    padding:5px 12px;cursor:pointer;font-weight:700;font-family:inherit}
  .lang-toggle button.active{background:var(--berry);color:#fff}
  .menu-btn{display:none;background:none;border:none;font-size:1.6rem;color:var(--berry);cursor:pointer}

  /* ---------- Hero ---------- */
  .hero{
    position:relative;padding:0;
    background:linear-gradient(160deg,var(--pink-soft) 0%,var(--cream) 55%);
    overflow:hidden;
  }
  .hero-inner{
    max-width:1080px;margin:0 auto;padding:74px 20px 86px;
    display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:center;
  }
  .hero h1{font-size:clamp(2.3rem,7vw,4rem);color:var(--berry-deep);line-height:1.05}
  .hero .tagline{font-size:1.2rem;font-style:italic;color:var(--berry);margin:18px 0 8px;font-family:'Playfair Display',serif}
  .hero p.sub{font-size:1.05rem;color:#6b5560;max-width:460px;margin-bottom:28px}
  .hero-cta{display:flex;gap:14px;flex-wrap:wrap}
  .hero-badges{display:flex;gap:18px;margin-top:30px;flex-wrap:wrap}
  .hero-badges div{font-size:.85rem;color:#7a6068}
  .hero-badges b{display:block;font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--berry)}

  /* decorative hero art (no real photos available — CSS illustration) */
  .hero-art{position:relative;height:360px;display:grid;place-items:center}
  .berry-plate{
    width:300px;height:300px;border-radius:50%;
    background:radial-gradient(circle at 38% 32%,#fff,#ffe1ec 60%,#ffc8dc);
    box-shadow:var(--shadow);display:grid;place-items:center;position:relative;
  }
  .berry-emoji{font-size:7rem;filter:drop-shadow(0 10px 14px rgba(168,27,70,.25))}
  .float{position:absolute;font-size:2.6rem;animation:float 5s ease-in-out infinite;filter:drop-shadow(0 6px 10px rgba(168,27,70,.2))}
  .float.f1{top:6%;left:2%;animation-delay:.2s}
  .float.f2{bottom:4%;right:0;font-size:3.2rem;animation-delay:1.1s}
  .float.f3{top:14%;right:6%;animation-delay:.6s}
  @keyframes float{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-16px) rotate(4deg)}}

  /* ---------- Product cards ---------- */
  .grid{display:grid;gap:24px}
  .products .grid{grid-template-columns:repeat(3,1fr)}
  .card{
    background:#fff;border-radius:var(--radius);overflow:hidden;
    box-shadow:0 8px 26px rgba(168,27,70,.08);border:1px solid #fbe3ec;
    transition:transform .2s ease,box-shadow .2s ease;display:flex;flex-direction:column;
  }
  .card:hover{transform:translateY(-6px);box-shadow:var(--shadow)}
  .card .thumb{
    height:170px;display:grid;place-items:center;font-size:4rem;
    background:linear-gradient(135deg,var(--pink-soft),#ffd9e6);
  }
  .card .thumb.c2{background:linear-gradient(135deg,#fff0e6,#ffd9c2)}
  .card .thumb.c3{background:linear-gradient(135deg,#f6e7ff,#e7d2ff)}
  .card .thumb.c4{background:linear-gradient(135deg,#fde9ec,#f8c6d2)}
  .card .body{padding:22px}
  .card h3{font-size:1.25rem;color:var(--berry-deep);margin-bottom:6px}
  .card p{font-size:.93rem;color:#6f5963}
  .price-tag{display:inline-block;margin-top:12px;font-weight:700;color:var(--berry);
    background:var(--pink-soft);padding:4px 12px;border-radius:30px;font-size:.85rem}

  /* ---------- Gallery ---------- */
  .gallery{background:var(--cream-2)}
  .gallery .grid{grid-template-columns:repeat(4,1fr);gap:14px}
  .tile{
    aspect-ratio:1;border-radius:16px;display:grid;place-items:center;font-size:2.6rem;
    background:linear-gradient(135deg,#ffe1ec,#ffc8dc);box-shadow:0 4px 14px rgba(168,27,70,.08);
  }
  .tile:nth-child(2n){background:linear-gradient(135deg,#fff0e6,#ffd9c2)}
  .tile:nth-child(3n){background:linear-gradient(135deg,#f6e7ff,#e7d2ff)}
  .tile:nth-child(5n){background:linear-gradient(135deg,#fde9ec,#f6b8c8)}
  .ig-note{margin-top:26px;text-align:center;color:#8a6f78;font-size:.9rem}

  /* ---------- How to order ---------- */
  .order{background:linear-gradient(160deg,#fff,var(--pink-soft))}
  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-bottom:36px}
  .step{text-align:center;padding:24px 16px;background:#fff;border-radius:var(--radius);
    box-shadow:0 6px 20px rgba(168,27,70,.07)}
  .step .num{width:46px;height:46px;border-radius:50%;background:var(--berry);color:#fff;
    display:grid;place-items:center;font-weight:700;font-size:1.2rem;margin:0 auto 14px;font-family:'Playfair Display'}
  .step h3{font-size:1.1rem;color:var(--berry-deep);margin-bottom:6px}
  .step p{font-size:.9rem;color:#6f5963}

  /* ---------- Course ---------- */
  .course{background:var(--choc);color:#fff8f3;border-radius:0}
  .course .wrap{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center}
  .course .eyebrow{color:var(--gold)}
  .course h2{color:#fff;font-size:clamp(1.8rem,5vw,2.6rem)}
  .course ul{list-style:none;margin:22px 0}
  .course li{padding:8px 0 8px 30px;position:relative;color:#f6e4dd}
  .course li::before{content:"🍓";position:absolute;left:0}
  .course-card{
    background:linear-gradient(160deg,var(--berry),var(--berry-deep));
    border-radius:var(--radius);padding:34px;text-align:center;box-shadow:var(--shadow)
  }
  .course-card .price{font-family:'Playfair Display';font-size:3rem;line-height:1}
  .course-card .price small{font-size:1rem;opacity:.8}
  .course-card .bonus{display:inline-block;background:var(--gold);color:var(--choc);
    font-weight:700;padding:5px 16px;border-radius:30px;margin:16px 0;font-size:.85rem}

  /* ---------- Events ---------- */
  .events .grid{grid-template-columns:repeat(3,1fr)}
  .event{padding:28px;border-radius:var(--radius);background:#fff;border:1px dashed var(--pink);
    text-align:center}
  .event .ico{font-size:2.6rem;margin-bottom:12px}
  .event h3{color:var(--berry-deep);font-size:1.15rem;margin-bottom:6px}
  .event p{font-size:.9rem;color:#6f5963}

  /* ---------- About ---------- */
  .about{background:var(--pink-soft)}
  .about .wrap{display:grid;grid-template-columns:.8fr 1.2fr;gap:40px;align-items:center}
  .about-art{height:300px;border-radius:var(--radius);background:radial-gradient(circle at 40% 35%,#fff,#ffd1e0);
    display:grid;place-items:center;font-size:6rem;box-shadow:var(--shadow)}
  .about blockquote{font-family:'Playfair Display';font-style:italic;font-size:1.3rem;color:var(--berry-deep);
    border-left:4px solid var(--pink);padding-left:18px;margin-top:22px}

  /* ---------- Contact ---------- */
  .contact{background:linear-gradient(160deg,var(--berry),var(--berry-deep));color:#fff;text-align:center}
  .contact h2{color:#fff}
  .contact .section-intro{color:#ffe0ea;margin-left:auto;margin-right:auto}
  .contact-cta{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin:30px 0 10px}
  .contact .btn-ghost{border-color:#fff;color:#fff}
  .contact .btn-ghost:hover{background:#fff;color:var(--berry)}
  .contact-meta{margin-top:18px;font-size:.92rem;color:#ffd9e4}

  /* ---------- Footer ---------- */
  footer{background:var(--choc);color:#e9d5cd;text-align:center;padding:34px 20px;font-size:.86rem}
  footer .fbrand{font-family:'Playfair Display';color:#fff;font-size:1.1rem;margin-bottom:6px}
  footer a{color:var(--pink)}
  .flag{background:#fff3cd;color:#7a5d00;font-size:.78rem;padding:2px 8px;border-radius:6px;font-weight:700}

  /* floating WhatsApp */
  .wa-float{position:fixed;bottom:22px;right:22px;z-index:60;width:60px;height:60px;border-radius:50%;
    background:#25D366;display:grid;place-items:center;font-size:1.9rem;color:#fff;
    box-shadow:0 10px 26px rgba(37,211,102,.5);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(37,211,102,.5)}70%{box-shadow:0 0 0 16px rgba(37,211,102,0)}100%{box-shadow:0 0 0 0 rgba(37,211,102,0)}}

  /* ---------- Responsive ---------- */
  @media(max-width:860px){
    .hero-inner{grid-template-columns:1fr;text-align:center;padding-top:48px}
    .hero-cta,.hero-badges{justify-content:center}
    .hero-art{order:-1;height:300px}
    .products .grid{grid-template-columns:1fr 1fr}
    .course .wrap,.about .wrap{grid-template-columns:1fr;text-align:center}
    .about blockquote{border-left:none;border-top:3px solid var(--pink);padding:14px 0 0;text-align:center}
    .gallery .grid{grid-template-columns:repeat(3,1fr)}
    .steps,.events .grid{grid-template-columns:1fr}
    .nav-links{position:fixed;inset:62px 0 auto 0;flex-direction:column;background:var(--cream);
      padding:20px;gap:16px;border-bottom:1px solid #f4dbe4;transform:translateY(-130%);
      transition:transform .3s ease;box-shadow:var(--shadow)}
    .nav-links.open{transform:translateY(0)}
    .menu-btn{display:block}
  }
  @media(max-width:520px){
    section{padding:48px 18px}
    .products .grid{grid-template-columns:1fr}
    .gallery .grid{grid-template-columns:1fr 1fr}
    .hero-badges{gap:12px}
  }
</style>
</head>

<script>
  function applyLang(lang){
    document.querySelectorAll('[data-es]').forEach(function(el){
      var t = el.getAttribute('data-'+lang);
      if(t!==null) el.textContent = t;
    });
  }
  function setLang(lang){
    document.body.classList.remove('lang-es','lang-en');
    document.body.classList.add('lang-'+lang);
    document.documentElement.lang = lang;
    document.getElementById('btn-es').classList.toggle('active', lang==='es');
    document.getElementById('btn-en').classList.toggle('active', lang==='en');
    applyLang(lang);
  }
  applyLang('es'); // initial render (Spanish primary)
  // close mobile menu on link click
  document.querySelectorAll('#navLinks a').forEach(a=>
    a.addEventListener('click',()=>document.getElementById('navLinks').classList.remove('open')));
  document.getElementById('yr').textContent = new Date().getFullYear();
</script>
